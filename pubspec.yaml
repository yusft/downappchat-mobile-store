name: downapp
description: "DownApp - App Store & Social Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  photo_view: ^0.15.0
  image_picker: ^1.1.2
  percent_indicator: ^4.2.3
  flutter_staggered_grid_view: ^0.7.0
  readmore: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  lottie: ^3.3.1

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.7

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  google_sign_in: ^6.2.2
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  file_picker: ^8.1.7
  open_file: ^3.5.10
  uuid: ^4.5.1
  timeago: ^3.7.0
  connectivity_plus: ^6.1.1
  share_plus: ^12.0.2
  flutter_rating_bar: ^4.0.1

  # Backend
  pocketbase: ^0.22.0
  http: ^1.2.1
  dio: ^5.8.0

  # Icons
  cupertino_icons: ^1.0.8
  icons_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    icon_background_color: "#ffffff"
